# ═══════════════════════════════════════════════════════════════════════════════
# NGINX Production Configuration for Hono + Bun + PostgreSQL
# Domain: hono-base.web.id
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name hono-base.web.id;

    # 🔥 Block malicious bots & scanners to save server resources
    if ($http_user_agent ~* (censys|scanner|xpanse|paloalto|sqlmap|nikto)) {
        return 444;
    }

    # Max upload body size = 60MB for avatars and file uploads
    client_max_body_size 60m;

    # Buffer configuration for large headers & request payloads
    proxy_buffer_size          256k;
    proxy_buffers              4 512k;
    proxy_busy_buffers_size    512k;
    large_client_header_buffers 4 128k;

    # Security Headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ─── Static Public Storage (/storage/*) ───────────────────────────────────
    location /storage/ {
        proxy_pass         http://127.0.0.1:8000/storage/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ─── Real-time WebSockets (/ws) ───────────────────────────────────────────
    location /ws {
        proxy_pass         http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Extended timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── Primary API Proxy ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_request_buffering on;
    }
}
