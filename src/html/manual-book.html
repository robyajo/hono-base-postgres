<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Book Development — {{APP_NAME}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <!-- Marked parser & Highlight.js for code syntax highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/atom-one-dark.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>

    <style>
      :root {
        --bg-radial: radial-gradient(circle at 50% 0%, #1e1b4b 0%, #0f172a 60%, #020617 100%);
        --card-bg: rgba(30, 41, 59, 0.7);
        --card-border: rgba(255, 255, 255, 0.08);
        --primary: #6366f1;
        --primary-glow: rgba(99, 102, 241, 0.35);
        --accent: #10b981;
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --code-bg: #0d1117;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        background: var(--bg-radial);
        color: var(--text-main);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      /* Ambient glow */
      body::before {
        content: '';
        position: fixed;
        top: -10%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
        background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(16, 185, 129, 0.05) 50%, transparent 70%);
        filter: blur(90px);
        pointer-events: none;
        z-index: 0;
      }

      /* Top Navbar */
      .navbar {
        position: sticky;
        top: 0;
        z-index: 50;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid var(--card-border);
        padding: 0.85rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .btn-back {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.45rem 0.85rem;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
        text-decoration: none;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.2s;
      }

      .btn-back:hover {
        background: rgba(99, 102, 241, 0.2);
        border-color: rgba(99, 102, 241, 0.4);
        color: #fff;
      }

      .nav-title {
        font-size: 0.95rem;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .btn-action {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.85rem;
        border-radius: 10px;
        background: var(--primary);
        color: #fff;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-action:hover {
        background: #4f46e5;
        box-shadow: 0 0 15px var(--primary-glow);
      }

      .btn-action-outline {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--text-main);
      }

      .btn-action-outline:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      /* Main Layout */
      .layout {
        display: grid;
        grid-template-columns: 260px 1fr;
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem 1.5rem;
        gap: 2rem;
        position: relative;
        z-index: 1;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .toc-sidebar {
          display: none;
        }
      }

      /* Sidebar TOC */
      .toc-sidebar {
        position: sticky;
        top: 5rem;
        height: calc(100vh - 7rem);
        overflow-y: auto;
        padding: 1.2rem;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 16px;
        backdrop-filter: blur(12px);
      }

      .toc-title {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
        margin-bottom: 0.8rem;
      }

      .toc-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }

      .toc-link {
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.82rem;
        display: block;
        padding: 0.35rem 0.6rem;
        border-radius: 8px;
        transition: all 0.2s;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .toc-link:hover, .toc-link.active {
        color: #fff;
        background: rgba(99, 102, 241, 0.15);
      }

      /* Article Main Container */
      .content-wrapper {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 2.5rem;
        backdrop-filter: blur(16px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      }

      /* Markdown Formatting Styles */
      .markdown-body h1 {
        font-size: 2rem;
        font-weight: 800;
        margin-bottom: 1rem;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        border-bottom: 1px solid var(--card-border);
        padding-bottom: 0.75rem;
      }

      .markdown-body h2 {
        font-size: 1.4rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 0.85rem;
        color: #f1f5f9;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding-bottom: 0.4rem;
      }

      .markdown-body h3 {
        font-size: 1.1rem;
        font-weight: 600;
        margin-top: 1.5rem;
        margin-bottom: 0.6rem;
        color: #cbd5e1;
      }

      .markdown-body p {
        font-size: 0.95rem;
        line-height: 1.7;
        color: #cbd5e1;
        margin-bottom: 1.2rem;
      }

      .markdown-body ul, .markdown-body ol {
        margin-bottom: 1.2rem;
        padding-left: 1.5rem;
        color: #cbd5e1;
      }

      .markdown-body li {
        margin-bottom: 0.4rem;
        line-height: 1.6;
      }

      .markdown-body code:not(pre code) {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.82rem;
        background: rgba(99, 102, 241, 0.12);
        color: #a5b4fc;
        padding: 0.2rem 0.45rem;
        border-radius: 6px;
        border: 1px solid rgba(99, 102, 241, 0.2);
      }

      .markdown-body pre {
        background: var(--code-bg) !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
        overflow-x: auto;
        position: relative;
      }

      .markdown-body pre code {
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85rem;
        line-height: 1.6;
      }

      /* Copy Button on Code blocks */
      .code-copy-btn {
        position: absolute;
        top: 0.6rem;
        right: 0.6rem;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: #cbd5e1;
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        font-size: 0.72rem;
        cursor: pointer;
        transition: all 0.2s;
      }

      .code-copy-btn:hover {
        background: var(--primary);
        color: #fff;
      }

      /* Tables */
      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5rem;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--card-border);
      }

      .markdown-body th {
        background: rgba(15, 23, 42, 0.8);
        color: #f8fafc;
        font-weight: 700;
        text-align: left;
        padding: 0.75rem 1rem;
        font-size: 0.85rem;
        border-bottom: 1px solid var(--card-border);
      }

      .markdown-body td {
        padding: 0.75rem 1rem;
        font-size: 0.88rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        color: #cbd5e1;
      }

      .markdown-body tr:nth-child(even) {
        background: rgba(255, 255, 255, 0.02);
      }

      /* Blockquotes & Alerts */
      .markdown-body blockquote {
        border-left: 4px solid var(--primary);
        background: rgba(99, 102, 241, 0.08);
        padding: 0.85rem 1.2rem;
        border-radius: 0 10px 10px 0;
        margin-bottom: 1.2rem;
        color: #e2e8f0;
      }

      .markdown-body hr {
        border: none;
        height: 1px;
        background: var(--card-border);
        margin: 2rem 0;
      }
    </style>
  </head>

  <body>
    <!-- Top Navigation Bar -->
    <header class="navbar">
      <div class="nav-left">
        <a href="/" class="btn-back">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="16" height="16">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          Dashboard
        </a>
        <div class="nav-title">
          <span>📘 Development Manual</span>
        </div>
      </div>
      <div class="nav-right">
        <a href="/download/manual-book" class="btn-action btn-action-outline">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="15" height="15">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          Download .md
        </a>
        <a href="/api/doc" class="btn-action">
          Swagger UI
        </a>
      </div>
    </header>

    <!-- Main Content Layout -->
    <div class="layout">
      <!-- Sidebar Table of Contents -->
      <aside class="toc-sidebar">
        <div class="toc-title">On This Page</div>
        <ul class="toc-list" id="tocList"></ul>
      </aside>

      <!-- Main Document Render -->
      <main class="content-wrapper">
        <article class="markdown-body" id="markdownContent">
          <p style="color: var(--text-muted);">Loading developer manual book...</p>
        </article>
      </main>
    </div>

    <!-- Hidden Raw Markdown Data Placeholder -->
    <script id="rawMarkdown" type="text/template">
{{MANUAL_BOOK_CONTENT}}
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const rawContent = document.getElementById("rawMarkdown").innerHTML.trim();
        const contentEl = document.getElementById("markdownContent");
        const tocListEl = document.getElementById("tocList");

        // 1. Configure Marked with Highlight.js
        marked.setOptions({
          highlight: function (code, lang) {
            if (lang && hljs.getLanguage(lang)) {
              return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
          },
          breaks: true
        });

        // 2. Parse & Render Markdown
        contentEl.innerHTML = marked.parse(rawContent);

        // 3. Add Copy buttons to code blocks
        document.querySelectorAll("pre").forEach((pre) => {
          const btn = document.createElement("button");
          btn.className = "code-copy-btn";
          btn.innerText = "Copy";
          btn.addEventListener("click", () => {
            const codeText = pre.querySelector("code")?.innerText || "";
            navigator.clipboard.writeText(codeText).then(() => {
              btn.innerText = "Copied!";
              setTimeout(() => (btn.innerText = "Copy"), 2000);
            });
          });
          pre.style.position = "relative";
          pre.appendChild(btn);
        });

        // 4. Generate Table of Contents from Headings
        const headings = contentEl.querySelectorAll("h1, h2, h3");
        headings.forEach((heading, index) => {
          const id = "section-" + index;
          heading.id = id;

          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = "#" + id;
          a.className = "toc-link";
          a.innerText = heading.innerText;
          
          if (heading.tagName === "H3") {
            a.style.paddingLeft = "1.2rem";
            a.style.fontSize = "0.78rem";
          }

          li.appendChild(a);
          tocListEl.appendChild(li);
        });
      });
    </script>
  </body>
</html>
